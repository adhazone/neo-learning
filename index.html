const rnd = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
const pick = arr => arr[Math.floor(Math.random() * arr.length)];
const gcd = (a, b) => b === 0 ? a : gcd(b, a % b);

// ── GENERATORS ────────────────────────────────────────────────────
function genCacah() {
  const ops = ["+", "-", "×"];
  const op = pick(ops);
  const a = rnd(1000, 99999);
  const b = rnd(100, 9999);
  let soal, ans, steps;
  if (op === "+") { ans = a + b; steps = [`Susun vertikal: ${a} + ${b}`, `Hitung dari satuan ke puluh-ribuan`, `✅ ${a} + ${b} = **${ans}**`]; soal = `${a} + ${b} = ?`; }
  else if (op === "-") { const [big, small] = a > b ? [a, b] : [b, a]; ans = big - small; steps = [`Susun vertikal: ${big} − ${small}`, `Kurang dari satuan, pinjam jika perlu`, `✅ ${big} − ${small} = **${ans}**`]; soal = `${big} − ${small} = ?`; }
  else { const x = rnd(100, 9999), y = rnd(2, 9); ans = x * y; steps = [`${x} × ${y}`, `Kalikan setiap digit dari satuan`, `✅ ${x} × ${y} = **${ans}**`]; soal = `${x} × ${y} = ?`; }
  return { soal, jawaban: ans, type:"number", steps };
}

function genOpcamp() {
  // (a op b) op c
  const a = rnd(2, 20), b = rnd(2, 10), c = rnd(2, 8);
  const ops = [["×", "+"], ["×", "-"], ["÷", "+"]];
  const [op1, op2] = pick(ops);
  let inner, ans, soal, steps;
  if (op1 === "×") { inner = a * b; }
  else { const bb = b === 0 ? 1 : b; inner = Math.floor(a * bb); /* a always divisible */ }
  if (op2 === "+") { ans = inner + c; }
  else { ans = inner > c ? inner - c : c - inner; }
  soal = `${a} ${op1} ${b} ${op2} ${c} = ?`;
  steps = [
    `Aturan: Kerjakan Kali/Bagi dulu sebelum Tambah/Kurang`,
    `Langkah 1: ${a} ${op1} ${b} = ${inner}`,
    `Langkah 2: ${inner} ${op2} ${c} = ${ans}`,
    `✅ Hasil: **${ans}**`,
  ];
  return { soal, jawaban: ans, type:"number", steps };
}

function genNegatif() {
  const a = rnd(-20, 20), b = rnd(-15, 15);
  const ops = ["+", "-"];
  const op = pick(ops);
  let ans, steps;
  if (op === "+") {
    ans = a + b;
    steps = [
      `Garis bilangan: mulai dari ${a}`,
      b >= 0 ? `Geser ke kanan ${b} langkah` : `Geser ke kiri ${Math.abs(b)} langkah`,
      `✅ ${a} + (${b}) = **${ans}**`,
    ];
  } else {
    ans = a - b;
    steps = [
      `${a} − (${b}) = ${a} + (${-b})`,
      `Ubah tanda: kurang negatif = tambah positif`,
      a + (-b) >= 0 ? `Geser ke kanan ${Math.abs(b)} dari ${a}` : `Geser ke kiri dari ${a}`,
      `✅ ${a} − (${b}) = **${ans}**`,
    ];
  }
  return { soal:`${a} ${op} (${b}) = ?`, jawaban:ans, type:"number", steps };
}

function genKpkfpb() {
  const type = pick(["kpk","fpb"]);
  const a = rnd(2, 15), b = rnd(2, 15);
  const g = gcd(a, b);
  const kpkVal = (a * b) / g;
  const fpbVal = g;
  if (type === "kpk") {
    const steps = [
      `Cari kelipatan ${a}: ${Array.from({length:5},(_,i)=>(i+1)*a).join(", ")}, ...`,
      `Cari kelipatan ${b}: ${Array.from({length:5},(_,i)=>(i+1)*b).join(", ")}, ...`,
      `Kelipatan persekutuan terkecil = ${kpkVal}`,
      `✅ KPK(${a}, ${b}) = **${kpkVal}**`,
    ];
    return { soal:`KPK dari ${a} dan ${b} = ?`, jawaban:kpkVal, type:"number", steps };
  } else {
    const factors = n => Array.from({length:n},(_,i)=>i+1).filter(i=>n%i===0);
    const steps = [
      `Faktor dari ${a}: ${factors(a).join(", ")}`,
      `Faktor dari ${b}: ${factors(b).join(", ")}`,
      `Faktor persekutuan terbesar = ${fpbVal}`,
      `✅ FPB(${a}, ${b}) = **${fpbVal}**`,
    ];
    return { soal:`FPB dari ${a} dan ${b} = ?`, jawaban:fpbVal, type:"number", steps };
  }
}

function genPecdas() {
  const type = pick(["senilai","banding"]);
  if (type === "senilai") {
    const den = pick([2,3,4,6,8]), num = rnd(1, den-1);
    const factor = pick([2,3,4]);
    const ansNum = num * factor, ansDen = den * factor;
    const steps = [
      `Pecahan senilai: kalikan pembilang dan penyebut dengan bilangan yang sama`,
      `${num}/${den} = ${num}×${factor} / ${den}×${factor}`,
      `✅ ${num}/${den} = **${ansNum}/${ansDen}**`,
    ];
    return { soal:`${num}/${den} = ?/${ansDen}`, jawaban:ansNum, type:"number", steps };
  } else {
    const den = pick([4,6,8,10,12]);
    const n1 = rnd(1,den-1), n2 = rnd(1,den-1);
    const ans = n1 > n2 ? ">" : n1 < n2 ? "<" : "=";
    const steps = [
      `Penyebut sama (${den}), bandingkan pembilang`,
      `${n1} ${ans} ${n2}`,
      `✅ ${n1}/${den} **${ans}** ${n2}/${den}`,
    ];
    return { soal:`${n1}/${den} ○ ${n2}/${den}  (>, <, atau =)`, jawaban:ans, type:"sign", steps };
  }
}

function genPecop() {
  const op = pick(["+","-","×","÷"]);
  const d1 = pick([2,3,4,5,6]), d2 = pick([2,3,4,5,6]);
  const n1 = rnd(1, d1-1), n2 = rnd(1, d2-1);
  let ans, ansStr, steps, soal;
  if (op === "+") {
    const lcm = (d1*d2)/gcd(d1,d2);
    const rn1 = n1*(lcm/d1), rn2 = n2*(lcm/d2);
    const rn = rn1+rn2;
    const g = gcd(rn, lcm);
    ansStr = lcm/g===1 ? `${rn/g}` : `${rn/g}/${lcm/g}`;
    steps = [
      `Samakan penyebut: KPK(${d1},${d2}) = ${lcm}`,
      `${n1}/${d1} = ${rn1}/${lcm},  ${n2}/${d2} = ${rn2}/${lcm}`,
      `Jumlahkan pembilang: ${rn1} + ${rn2} = ${rn}`,
      g>1 ? `Sederhanakan: ${rn}/${lcm} ÷ ${g} = ${ansStr}` : `Hasil sudah sederhana`,
      `✅ **${ansStr}**`,
    ];
    soal = `${n1}/${d1} + ${n2}/${d2} = ?`;
  } else if (op === "-") {
    const lcm = (d1*d2)/gcd(d1,d2);
    const rn1 = n1*(lcm/d1), rn2 = n2*(lcm/d2);
    const [big,small] = rn1>=rn2?[rn1,rn2]:[rn2,rn1];
    const [bn1,bd1] = rn1>=rn2?[n1,d1]:[n2,d2];
    const [bn2,bd2] = rn1>=rn2?[n2,d2]:[n1,d1];
    const rn = big-small;
    const g = gcd(rn,lcm);
    ansStr = rn===0 ? "0" : lcm/g===1 ? `${rn/g}` : `${rn/g}/${lcm/g}`;
    steps = [
      `Samakan penyebut: KPK(${bd1},${bd2}) = ${lcm}`,
      `${bn1}/${bd1} = ${big}/${lcm},  ${bn2}/${bd2} = ${small}/${lcm}`,
      `Kurang pembilang: ${big} − ${small} = ${rn}`,
      g>1 ? `Sederhanakan: ${ansStr}` : `Hasil: ${ansStr}`,
      `✅ **${ansStr}**`,
    ];
    soal = `${bn1}/${bd1} − ${bn2}/${bd2} = ?`;
  } else if (op === "×") {
    const rn = n1*n2, rd = d1*d2;
    const g = gcd(rn,rd);
    ansStr = rd/g===1?`${rn/g}`:`${rn/g}/${rd/g}`;
    steps = [
      `Kalikan pembilang: ${n1} × ${n2} = ${rn}`,
      `Kalikan penyebut: ${d1} × ${d2} = ${rd}`,
      g>1?`Sederhanakan: ${rn}/${rd} ÷ ${g} = ${ansStr}`:`Hasil: ${ansStr}`,
      `✅ **${ansStr}**`,
    ];
    soal = `${n1}/${d1} × ${n2}/${d2} = ?`;
  } else {
    // ÷ = × kebalikan
    const rn = n1*d2, rd = d1*n2;
    const g = gcd(rn,rd);
    ansStr = rd/g===1?`${rn/g}`:`${rn/g}/${rd/g}`;
    steps = [
      `Balik pecahan kedua: ${n2}/${d2} menjadi ${d2}/${n2}`,
      `${n1}/${d1} ÷ ${n2}/${d2} = ${n1}/${d1} × ${d2}/${n2}`,
      `= ${rn}/${rd}`,
      g>1?`Sederhanakan: ${ansStr}`:`Hasil: ${ansStr}`,
      `✅ **${ansStr}**`,
    ];
    soal = `${n1}/${d1} ÷ ${n2}/${d2} = ?`;
  }
  return { soal, jawaban:ansStr, type:"fraction", steps };
}

function genDespersen() {
  const type = pick(["pec_to_des","des_to_pct","pct_to_frac"]);
  const dens = [2,4,5,10,20,25,100];
  const den = pick(dens);
  const num = rnd(1, den-1);
  const val = num/den;
  if (type === "pec_to_des") {
    const ans = parseFloat(val.toFixed(4));
    return { soal:`${num}/${den} = ? (desimal)`, jawaban:ans, type:"decimal",
      steps:[`Bagi: ${num} ÷ ${den}`,`= ${ans}`,`✅ **${ans}**`] };
  } else if (type === "des_to_pct") {
    const des = parseFloat(val.toFixed(2));
    const pct = Math.round(des*100);
    return { soal:`${des} = ? (persen)`, jawaban:pct, type:"number",
      steps:[`Kalikan dengan 100: ${des} × 100 = ${pct}%`,`✅ **${pct}%**`] };
  } else {
    const pct = Math.round(val*100);
    const g = gcd(pct,100);
    const ansStr = 100/g===1?`${pct/g}`:`${pct/g}/${100/g}`;
    return { soal:`${pct}% = ? (pecahan sederhana)`, jawaban:ansStr, type:"fraction",
      steps:[`${pct}% = ${pct}/100`,`Sederhanakan: ÷ ${g} = ${ansStr}`,`✅ **${ansStr}**`] };
  }
}

function genKelilingluas() {
  const shape = pick(["persegi","persegipanjang","segitiga"]);
  const type = pick(["keliling","luas"]);
  if (shape === "persegi") {
    const s = rnd(3,30);
    if (type === "keliling") {
      return { soal:`Keliling persegi dengan sisi ${s} cm = ?`, jawaban:4*s, type:"number",
        steps:[`K = 4 × sisi`,`K = 4 × ${s} = ${4*s} cm`,`✅ **${4*s} cm**`] };
    } else {
      return { soal:`Luas persegi dengan sisi ${s} cm = ?`, jawaban:s*s, type:"number",
        steps:[`L = sisi × sisi`,`L = ${s} × ${s} = ${s*s} cm²`,`✅ **${s*s} cm²**`] };
    }
  } else if (shape === "persegipanjang") {
    const p = rnd(5,40), l = rnd(2,20);
    if (type === "keliling") {
      const ans = 2*(p+l);
      return { soal:`Keliling persegi panjang: p=${p}cm, l=${l}cm = ?`, jawaban:ans, type:"number",
        steps:[`K = 2 × (p + l)`,`K = 2 × (${p} + ${l}) = 2 × ${p+l} = ${ans} cm`,`✅ **${ans} cm**`] };
    } else {
      const ans = p*l;
      return { soal:`Luas persegi panjang: p=${p}cm, l=${l}cm = ?`, jawaban:ans, type:"number",
        steps:[`L = p × l`,`L = ${p} × ${l} = ${ans} cm²`,`✅ **${ans} cm²**`] };
    }
  } else {
    const a = rnd(3,20), t = rnd(3,20);
    if (type === "luas") {
      const ans = (a*t)/2;
      return { soal:`Luas segitiga: alas=${a}cm, tinggi=${t}cm = ?`, jawaban:ans, type:"number",
        steps:[`L = ½ × alas × tinggi`,`L = ½ × ${a} × ${t} = ${ans} cm²`,`✅ **${ans} cm²**`] };
    } else {
      const b = rnd(3,20), c = rnd(3,20);
      const ans = a+b+c;
      return { soal:`Keliling segitiga: sisi ${a}, ${b}, ${c} cm = ?`, jawaban:ans, type:"number",
        steps:[`K = sisi1 + sisi2 + sisi3`,`K = ${a} + ${b} + ${c} = ${ans} cm`,`✅ **${ans} cm**`] };
    }
  }
}

function genLingkaran() {
  const r = rnd(3,20);
  const type = pick(["keliling","luas"]);
  const PI = 3.14;
  if (type === "keliling") {
    const ans = parseFloat((2*PI*r).toFixed(2));
    return { soal:`Keliling lingkaran dengan jari-jari ${r} cm (π = 3.14) = ?`, jawaban:ans, type:"number",
      steps:[`K = 2 × π × r`,`K = 2 × 3.14 × ${r}`,`K = 6.28 × ${r} = ${ans} cm`,`✅ **${ans} cm**`] };
  } else {
    const ans = parseFloat((PI*r*r).toFixed(2));
    return { soal:`Luas lingkaran dengan jari-jari ${r} cm (π = 3.14) = ?`, jawaban:ans, type:"number",
      steps:[`L = π × r²`,`L = 3.14 × ${r}²`,`L = 3.14 × ${r*r} = ${ans} cm²`,`✅ **${ans} cm²**`] };
  }
}

function genVolume() {
  const shape = pick(["kubus","balok","tabung"]);
  if (shape === "kubus") {
    const s = rnd(2,15);
    const ans = s**3;
    return { soal:`Volume kubus dengan sisi ${s} cm = ?`, jawaban:ans, type:"number",
      steps:[`V = sisi³`,`V = ${s} × ${s} × ${s}`,`V = ${s*s} × ${s} = ${ans} cm³`,`✅ **${ans} cm³**`] };
  } else if (shape === "balok") {
    const p=rnd(3,20), l=rnd(2,15), t=rnd(2,12);
    const ans = p*l*t;
    return { soal:`Volume balok: p=${p}, l=${l}, t=${t} cm = ?`, jawaban:ans, type:"number",
      steps:[`V = p × l × t`,`V = ${p} × ${l} × ${t}`,`V = ${p*l} × ${t} = ${ans} cm³`,`✅ **${ans} cm³**`] };
  } else {
    const r=rnd(2,10), t=rnd(3,20);
    const ans = parseFloat((3.14*r*r*t).toFixed(2));
    return { soal:`Volume tabung: r=${r}cm, t=${t}cm (π=3.14) = ?`, jawaban:ans, type:"number",
      steps:[`V = π × r² × t`,`V = 3.14 × ${r}² × ${t}`,`V = 3.14 × ${r*r} × ${t} = ${ans} cm³`,`✅ **${ans} cm³**`] };
  }
}

function genSudut() {
  const type = pick(["jenis","komplemen","suplemen"]);
  if (type === "jenis") {
    const deg = pick([30,45,60,75,90,100,120,150,170]);
    const jenis = deg < 90 ? "lancip" : deg === 90 ? "siku-siku" : "tumpul";
    return { soal:`Sudut ${deg}° termasuk jenis sudut apa?`, jawaban:jenis, type:"text",
      steps:[`< 90° = sudut lancip`,`= 90° = sudut siku-siku`,`> 90° = sudut tumpul`,`${deg}° → **${jenis}**`] };
  } else if (type === "komplemen") {
    const a = rnd(10,80);
    const ans = 90-a;
    return { soal:`Komplemen sudut ${a}° = ? (dua sudut berjumlah 90°)`, jawaban:ans, type:"number",
      steps:[`Komplemen: 90° − ${a}°`,`= ${ans}°`,`✅ **${ans}°**`] };
  } else {
    const a = rnd(10,170);
    const ans = 180-a;
    return { soal:`Suplemen sudut ${a}° = ? (dua sudut berjumlah 180°)`, jawaban:ans, type:"number",
      steps:[`Suplemen: 180° − ${a}°`,`= ${ans}°`,`✅ **${ans}°**`] };
  }
}

function genSatuan() {
  const type = pick(["panjang","berat"]);
  if (type === "panjang") {
    const units = ["km","hm","dam","m","dm","cm","mm"];
    const i1 = rnd(0,5), i2 = i1+rnd(1,3);
    const n = rnd(1,100);
    const factor = Math.pow(10, i2-i1);
    const ans = n * factor;
    return { soal:`${n} ${units[i1]} = ? ${units[Math.min(i2,6)]}`, jawaban:ans, type:"number",
      steps:[`Tangga satuan panjang: km→hm→dam→m→dm→cm→mm`,`Turun ${i2-i1} tangga = × ${factor}`,`${n} × ${factor} = ${ans}`,`✅ **${ans} ${units[Math.min(i2,6)]}**`] };
  } else {
    const units = ["ton","kw","kg","hg","dag","g"];
    const i1 = rnd(0,4), i2 = i1+rnd(1,3);
    const n = rnd(1,50);
    const factor = Math.pow(10, i2-i1);
    const ans = n * factor;
    return { soal:`${n} ${units[i1]} = ? ${units[Math.min(i2,5)]}`, jawaban:ans, type:"number",
      steps:[`Tangga berat: ton→kw→kg→hg→dag→g`,`Turun ${i2-i1} tangga = × ${factor}`,`${n} × ${factor} = ${ans}`,`✅ **${ans} ${units[Math.min(i2,5)]}**`] };
  }
}

function genJwk() {
  const type = pick(["j","k","w"]);
  const k = rnd(30,120)*5; // kecepatan dalam km/jam
  const w = rnd(1,8) * 0.5; // waktu dalam jam
  const j = k * w;
  if (type === "j") {
    return { soal:`Kecepatan ${k} km/jam, waktu ${w} jam. Jarak = ?`, jawaban:j, type:"number",
      steps:[`J = K × W`,`J = ${k} × ${w}`,`J = ${j} km`,`✅ **${j} km**`] };
  } else if (type === "k") {
    return { soal:`Jarak ${j} km, waktu ${w} jam. Kecepatan = ?`, jawaban:k, type:"number",
      steps:[`K = J ÷ W`,`K = ${j} ÷ ${w}`,`K = ${k} km/jam`,`✅ **${k} km/jam**`] };
  } else {
    return { soal:`Jarak ${j} km, kecepatan ${k} km/jam. Waktu = ?`, jawaban:w, type:"decimal",
      steps:[`W = J ÷ K`,`W = ${j} ÷ ${k}`,`W = ${w} jam`,`✅ **${w} jam**`] };
  }
}

function genRasiskal() {
  const type = pick(["rasio","skala"]);
  if (type === "rasio") {
    const a = rnd(2,20), b = rnd(2,20);
    const g = gcd(a,b);
    const x = rnd(2,6);
    const bigA = a*x, bigB = b*x;
    return { soal:`${bigA} : ${bigB} = ? : ${b}`, jawaban:a, type:"number",
      steps:[`Sederhanakan: ${bigA}:${bigB} = ${a}:${b} (bagi ${x})`,`Jawaban: ${a}`,`✅ **${a}**`] };
  } else {
    const skala = pick([1000,5000,10000,50000,200000]);
    const petaCm = rnd(2,20);
    const realKm = (petaCm * skala) / 100000;
    const ans = parseFloat(realKm.toFixed(2));
    return { soal:`Skala 1:${skala.toLocaleString("id")}. Pada peta ${petaCm} cm = ? km sebenarnya`, jawaban:ans, type:"decimal",
      steps:[`Jarak sebenarnya = jarak peta × skala`,`= ${petaCm} cm × ${skala} = ${petaCm*skala} cm`,`= ${petaCm*skala/100} m = ${ans} km`,`✅ **${ans} km**`] };
  }
}

function genStatistik() {
  const n = rnd(4,8);
  const data = Array.from({length:n}, ()=>rnd(10,99));
  const sorted = [...data].sort((a,b)=>a-b);
  const type = pick(["mean","median","modus"]);
  if (type === "mean") {
    const sum = data.reduce((a,b)=>a+b,0);
    const ans = parseFloat((sum/n).toFixed(2));
    return { soal:`Data: ${data.join(", ")}. Mean (rata-rata) = ?`, jawaban:ans, type:"decimal",
      steps:[`Jumlahkan: ${data.join(" + ")} = ${sum}`,`Bagi dengan banyak data: ${sum} ÷ ${n} = ${ans}`,`✅ **${ans}**`] };
  } else if (type === "median") {
    let ans;
    if (n%2===1) { ans = sorted[Math.floor(n/2)]; }
    else { ans = (sorted[n/2-1]+sorted[n/2])/2; }
    return { soal:`Data: ${data.join(", ")}. Median (nilai tengah) = ?`, jawaban:ans, type:"decimal",
      steps:[`Urutkan: ${sorted.join(", ")}`,n%2===1?`Ambil nilai tengah (posisi ${Math.floor(n/2)+1})`:`Rata-rata dua nilai tengah: (${sorted[n/2-1]}+${sorted[n/2]})/2`,`✅ **${ans}**`] };
  } else {
    const freq = {};
    data.forEach(x => { freq[x]=(freq[x]||0)+1; });
    const maxF = Math.max(...Object.values(freq));
    const modus = Object.keys(freq).filter(k=>freq[k]===maxF).map(Number).sort((a,b)=>a-b);
    const ans = modus[0];
    return { soal:`Data: ${data.join(", ")}. Modus (nilai terbanyak) = ?`, jawaban:ans, type:"number",
      steps:[`Hitung frekuensi: ${Object.entries(freq).map(([k,v])=>`${k}(×${v})`).join(", ")}`,`Frekuensi terbanyak: ${maxF}`,`Modus = ${modus.join(" dan ")}`,`✅ **${ans}**`] };
  }
}

const GENERATORS = {

  pecdas:genPecdas, pecop:genPecop, despersen:genDespersen,
  kelilingluas:genKelilingluas, lingkaran:genLingkaran, volume:genVolume, sudut:genSudut,

function generateSoal(topic) {

// Poin dasar berdasarkan TIER siswa (1=Warrior…7=Mythic)
function getWajibPoinBase(poin) {
  const ppv = LevelSettings.data.poinPerLevel;
  const lvlNum = poinToLevel(poin, ppv);
  const tierIdx = TIERS.findIndex(t => lvlNum >= t.range[0] && lvlNum <= t.range[1]);
  const bases = [8, 10, 13, 16, 20, 25, 30];
  return bases[Math.max(0, Math.min(tierIdx, bases.length - 1))];
}

// Streak bonus thresholds
function getStreakBonus(streak) {
  if (streak >= 7) return 8;
  if (streak >= 5) return 5;
  if (streak >= 3) return 3;
  return 0;
}

const WAJIB_LEVEL_COLOR = ["","#8A9ABB","#12C07A","#1A6BFF","#F5A623","#F04060","#8B5CF6"];

function generateWajib(op, adaptLvl) {
  const lvl = Math.min(Math.max(adaptLvl, 1), 6);
  const cfg = WAJIB_RANGES[op][lvl];

  if (op === "tambah") {
    const a = rnd(cfg.a[0], cfg.a[1]);
    const b = rnd(cfg.b[0], cfg.b[1]);
    const ans = a + b;
    // reuse step builder from existing code
    const steps = [`Susun: ${a} + ${b}`, `Hitung dari satuan ke atas`, `✅ ${a} + ${b} = **${ans}**`];
    return { soal:`${a} + ${b} = ?`, jawaban:ans, type:"number", steps };
  }
  if (op === "kurang") {
    let a = rnd(cfg.a[0], cfg.a[1]);
    let b = rnd(cfg.b[0], Math.min(cfg.b[1], a));
    if (b > a) [a, b] = [b, a];
    const ans = a - b;
    const steps = [`Susun: ${a} − ${b}`, `Kurang dari satuan, pinjam jika perlu`, `✅ ${a} − ${b} = **${ans}**`];
    return { soal:`${a} − ${b} = ?`, jawaban:ans, type:"number", steps };
  }
  if (op === "kali") {
    const a = rnd(cfg.a[0], cfg.a[1]);
    const b = rnd(cfg.b[0], cfg.b[1]);
    const ans = a * b;
    const steps = a < 10 && b < 10
      ? [`${a} × ${b} = ${ans} (tabel perkalian)`, `✅ **${ans}**`]
      : [`Pecah: kalikan tiap digit ${b} dengan ${a}`, `✅ ${a} × ${b} = **${ans}**`];
    return { soal:`${a} × ${b} = ?`, jawaban:ans, type:"number", steps };
  }
  if (op === "bagi") {
    const b = rnd(cfg.b[0], cfg.b[1]);
    const q = rnd(cfg.q[0], cfg.q[1]);
    const a = b * q;
    const steps = [`${a} ÷ ${b} = ?`, `Gunakan kebalikan: ${b} × ${q} = ${a} ✓`, `✅ **${q}**`];
    return { soal:`${a} ÷ ${b} = ?`, jawaban:q, type:"number", steps };
  }
  return { soal:"Error", jawaban:0, type:"number", steps:[] };
}

function isTodayDone(ts) {
  if (!ts) return false;
  const d = new Date(ts);
  const now = new Date();
  return d.getDate()===now.getDate() && d.getMonth()===now.getMonth() && d.getFullYear()===now.getFullYear();
}

function checkAnswer(userAns, correct, type) {
  const u = String(userAns).toLowerCase().trim().replace(",",".");
  const c = String(correct).toLowerCase().trim().replace(",",".");
  if (type === "fraction" || type === "sign" || type === "text") return u === c;
  const uN = parseFloat(u), cN = parseFloat(c);
  return !isNaN(uN) && !isNaN(cN) && Math.abs(uN - cN) < 0.01;
}

function getTier(lvlNum) {
  return TIERS.find(t => lvlNum >= t.range[0] && lvlNum <= t.range[1]) || TIERS[TIERS.length-1];
}

// LevelSettings store — tutor can configure poin per level threshold
const LevelSettings = {
  // poinPerLevel: poin needed to advance 1 level (default 100)
  // startLevel: default starting level for new students (default 1)
  data: { poinPerLevel: 100, startLevel: 1 },
  listeners: [],
  get() { return { ...this.data }; },
  set(patch) { this.data = { ...this.data, ...patch }; this.listeners.forEach(f => f({ ...this.data })); },
  subscribe(f) { this.listeners.push(f); return () => { this.listeners = this.listeners.filter(l => l !== f); }; },
};

// Convert poin → level number (1–31 Mythic)
function poinToLevel(poin, poinPerLevel) {
  const ppv = poinPerLevel || LevelSettings.data.poinPerLevel;
  return Math.min(31, 1 + Math.floor(poin / ppv));
}

// Get full level info from poin
function getLvl(poin) {
  const ppv = LevelSettings.data.poinPerLevel;
  const lvlNum = poinToLevel(poin, ppv);
  const tier = getTier(lvlNum);
  const isMythic = lvlNum >= 31;
  const poinInLevel = poin % ppv;
  const pct = isMythic ? 100 : Math.round((poinInLevel / ppv) * 100);
  const nextLvl = isMythic ? null : lvlNum + 1;
  const nextTier = nextLvl ? getTier(nextLvl) : null;
  const poinToNext = isMythic ? 0 : ppv - poinInLevel;
  return {
    lvlNum, tier, isMythic, pct, poinToNext, nextLvl, nextTier,
    // legacy compat
    l: lvlNum, name: isMythic ? "Mythic" : tier.name, col: tier.col,
    next: nextLvl ? { name: nextTier?.name, min: (lvlNum) * ppv } : null,
  };
}

.sdot.green .core{background:#12C07A;}.sdot.green .ring{background:#12C07A;animation:ripple 1.4s ease-out infinite;}
.sdot.red .core{background:#F04060;}.sdot.red .ring{opacity:0;}
.sdot.grey .core{background:#C5D0E4;}.sdot.grey .ring{opacity:0;}
.spill{display:inline-flex;align-items:center;gap:5px;padding:3px 9px 3px 5px;border-radius:100px;font-size:11px;font-weight:700;}
.spill.green{background:var(--gbg);border:1px solid var(--gbdr);color:#0A8A55;}
.spill.red{background:var(--rbg);border:1px solid var(--rbdr);color:#C0162E;}
.spill.grey{background:#F0F4FF;border:1px solid var(--bdr);color:var(--tx3);}

/* LOGIN */
.lw{min-height:100vh;display:flex;background:var(--wh);}
.ll{flex:1;background:linear-gradient(145deg,#0F4FCC 0%,#1A6BFF 55%,#4D8FFF 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px;position:relative;overflow:hidden;}
.ll-circle{position:absolute;border-radius:50%;background:rgba(255,255,255,.06);}
.ll-content{position:relative;z-index:1;text-align:center;}
.neo-big{font-family:'Syne',sans-serif;font-size:80px;font-weight:800;color:white;letter-spacing:-4px;line-height:1;margin-bottom:10px;}
.neo-sub-txt{color:rgba(255,255,255,.7);font-size:13px;letter-spacing:3px;text-transform:uppercase;font-weight:600;margin-bottom:44px;}
.lf-list{display:flex;flex-direction:column;gap:14px;text-align:left;max-width:300px;}
.lf-item{display:flex;align-items:center;gap:12px;color:rgba(255,255,255,.85);font-size:14px;font-weight:500;}
.lf-dot{width:34px;height:34px;border-radius:9px;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.lr{width:440px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 40px;}
.lform{width:100%;}
.logo-row{display:flex;align-items:center;gap:9px;margin-bottom:32px;}
.logo-ico{width:36px;height:36px;background:var(--blue);border-radius:9px;display:flex;align-items:center;justify-content:center;}
.logo-txt{font-family:'Syne',sans-serif;font-size:21px;font-weight:800;color:var(--tx);letter-spacing:-1px;}
.lhd{font-family:'Syne',sans-serif;font-size:25px;font-weight:800;color:var(--tx);margin-bottom:5px;letter-spacing:-.5px;}
.lsub{font-size:13px;color:var(--tx2);margin-bottom:28px;}
.tab-row{display:flex;gap:4px;background:var(--off);border-radius:var(--r);padding:4px;margin-bottom:24px;border:1px solid var(--bdr);}
.tab-btn{flex:1;padding:9px;background:transparent;border:none;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;color:var(--tx3);transition:all .2s;}
.tab-btn.on{background:var(--wh);color:var(--blue);box-shadow:0 1px 4px rgba(26,107,255,.15);}
.field{margin-bottom:15px;}
.field label{display:block;font-size:11px;font-weight:700;color:var(--tx2);letter-spacing:.4px;text-transform:uppercase;margin-bottom:6px;}
.field input,.field select{width:100%;padding:11px 13px;background:var(--off);border:1.5px solid var(--bdr);border-radius:var(--r);color:var(--tx);font-size:14px;outline:none;transition:border-color .2s;}
.field input:focus,.field select:focus{border-color:var(--blue);background:var(--wh);}
.login-cta{width:100%;padding:14px;background:var(--blue);color:white;border:none;border-radius:var(--r);font-size:15px;font-weight:700;cursor:pointer;margin-top:4px;transition:all .2s;}
.login-cta:hover{background:var(--blue-d);box-shadow:var(--sh-md);transform:translateY(-1px);}
.login-err{background:#FFF0F2;border:1px solid #FFCCD5;color:var(--red);padding:10px 13px;border-radius:var(--r);font-size:13px;margin-bottom:13px;font-weight:600;}
.login-note{text-align:center;font-size:12px;color:var(--tx3);margin-top:14px;}
@media(max-width:700px){.ll{display:none;}.lr{width:100%;padding:36px 24px;}}

/* SHELL */
.shell{min-height:100vh;display:flex;flex-direction:column;background:var(--off);}
.topbar{height:58px;background:var(--wh);border-bottom:1px solid var(--bdr);display:flex;align-items:center;padding:0 20px;gap:12px;position:sticky;top:0;z-index:50;}
.topbar-sp{flex:1;}
.uchip{display:flex;align-items:center;gap:8px;background:var(--sky);border:1px solid var(--blue-m);border-radius:100px;padding:5px 12px 5px 5px;}
.uchip-av{width:26px;height:26px;border-radius:50%;background:var(--blue);color:white;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;}
.uchip-name{font-size:13px;font-weight:700;color:var(--tx);}
.logout-btn{padding:7px 13px;background:transparent;border:1.5px solid var(--bdr);border-radius:var(--r);color:var(--tx2);font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;}
.logout-btn:hover{border-color:var(--red);color:var(--red);}
.page{flex:1;padding:22px 20px 100px;max-width:880px;margin:0 auto;width:100%;}
.bot-nav{position:fixed;bottom:0;left:0;right:0;background:var(--wh);border-top:1px solid var(--bdr);display:flex;z-index:50;box-shadow:0 -4px 16px rgba(26,107,255,.06);padding-bottom:env(safe-area-inset-bottom);}
.bot-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:9px 4px 11px;border:none;background:transparent;color:var(--tx3);font-size:10px;font-weight:700;cursor:pointer;transition:color .2s;letter-spacing:.3px;text-transform:uppercase;}
.bot-btn.on{color:var(--blue);}
.bot-btn svg{width:20px;height:20px;}
.nb-dot{width:4px;height:4px;background:var(--blue);border-radius:50%;margin-top:1px;}

/* COMMON */
.pg-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;letter-spacing:-.5px;color:var(--tx);margin-bottom:4px;}
.pg-sub{font-size:13px;color:var(--tx2);margin-bottom:22px;}
.sec-hd{display:flex;align-items:center;gap:10px;margin-bottom:13px;}
.sec-hd-t{font-family:'Syne',sans-serif;font-size:14px;font-weight:800;color:var(--tx);white-space:nowrap;}
.sec-hd-line{flex:1;height:1px;background:var(--bdr);}
.back-btn{display:flex;align-items:center;gap:6px;background:none;border:none;cursor:pointer;font-size:13px;font-weight:700;color:var(--tx2);padding:0;margin-bottom:18px;transition:color .2s;}
.back-btn:hover{color:var(--blue);}
.kscroll{display:flex;gap:6px;margin-bottom:15px;overflow-x:auto;padding-bottom:2px;-webkit-overflow-scrolling:touch;}
.kscroll::-webkit-scrollbar{height:0;}
.kp{padding:7px 15px;border-radius:100px;border:1.5px solid var(--bdr);background:var(--wh);color:var(--tx2);font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;white-space:nowrap;}
.kp.on{background:var(--blue);border-color:var(--blue);color:white;}

/* STATUS BAR */
.sbar{position:sticky;top:58px;z-index:40;padding:7px 20px;display:flex;align-items:center;gap:8px;font-size:12px;font-weight:700;transition:all .3s;}
.sbar.active{background:var(--gbg);border-bottom:1px solid var(--gbdr);color:#0A8A55;}
.sbar.inactive{background:var(--rbg);border-bottom:1px solid var(--rbdr);color:#C0162E;}

/* LEVEL BANNER */
.lv-banner{background:linear-gradient(120deg,var(--blue) 0%,#4D8FFF 100%);border-radius:var(--r3);padding:20px 22px;color:white;margin-bottom:20px;position:relative;overflow:hidden;box-shadow:var(--sh-lg);}
.lv-deco{position:absolute;border-radius:50%;background:rgba(255,255,255,.07);}
.lv-row{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:13px;}
.lv-label{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;opacity:.75;margin-bottom:4px;}
.lv-name{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;}
.lv-poin{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;line-height:1;text-align:right;}
.lv-poin-lbl{font-size:11px;opacity:.7;text-align:right;text-transform:uppercase;letter-spacing:.5px;margin-top:2px;}
.lv-track{height:6px;background:rgba(255,255,255,.25);border-radius:100px;}
.lv-fill{height:100%;border-radius:100px;background:white;transition:width .8s cubic-bezier(.4,0,.2,1);}
.lv-hint{font-size:11px;opacity:.7;margin-top:6px;}

/* BANK MATERI — Pilih Apa Hari Ini */
.jenjang-section{margin-bottom:28px;}
.jenjang-header{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:var(--r);margin-bottom:12px;}
.jenjang-num{font-family:'Syne',sans-serif;font-size:11px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;opacity:.8;}
.jenjang-name{font-family:'Syne',sans-serif;font-size:14px;font-weight:800;}
.topics-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.topic-card{background:var(--wh);border:1.5px solid var(--bdr);border-radius:var(--r2);padding:16px 14px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;}
.topic-card:hover{transform:translateY(-2px);box-shadow:var(--sh-md);}
.topic-card.recent{border-left:3px solid var(--gold);}
.topic-accent{position:absolute;right:-14px;top:-14px;width:54px;height:54px;border-radius:50%;opacity:.12;}
.topic-icon-big{font-size:26px;margin-bottom:8px;display:block;}
.topic-name{font-family:'Syne',sans-serif;font-size:13px;font-weight:800;color:var(--tx);margin-bottom:3px;line-height:1.3;}
.topic-tag{font-size:10px;color:var(--tx3);font-weight:600;margin-bottom:4px;}
.panduan-badge{display:inline-block;background:var(--off);border:1px solid var(--bdr);border-radius:100px;padding:2px 7px;font-size:9px;font-weight:700;color:var(--tx3);}
.panduan-badge.free{background:rgba(18,192,122,.08);border-color:rgba(18,192,122,.2);color:#0A8A55;}
.topic-last{display:flex;align-items:center;gap:4px;margin-top:6px;font-size:10px;color:var(--gold);font-weight:700;}

/* ARENA LATIHAN */
.arena-wrap{display:flex;flex-direction:column;gap:14px;}
.arena-header{background:var(--wh);border:1.5px solid var(--bdr);border-radius:var(--r2);padding:16px 18px;box-shadow:var(--sh);}
.arena-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.arena-topic{font-family:'Syne',sans-serif;font-size:15px;font-weight:800;color:var(--tx);}
.arena-chips{display:flex;align-items:center;gap:8px;}
.score-chip{display:flex;align-items:center;gap:4px;background:var(--sky);border:1px solid var(--blue-m);border-radius:100px;padding:4px 12px;font-family:'Syne',sans-serif;font-size:13px;font-weight:800;color:var(--blue);}
.streak-chip{background:rgba(245,166,35,.1);border:1px solid rgba(245,166,35,.3);border-radius:100px;padding:4px 10px;font-size:12px;font-weight:700;color:#A0620A;}
.prog-bar{height:5px;background:var(--bdr);border-radius:100px;overflow:hidden;}
.prog-fill{height:100%;border-radius:100px;background:linear-gradient(90deg,var(--blue),#4D8FFF);transition:width .4s ease;}
.soal-card{background:var(--wh);border:1.5px solid var(--bdr);border-radius:var(--r3);padding:26px 22px;box-shadow:var(--sh);text-align:center;}
.soal-num-badge{display:inline-flex;align-items:center;background:var(--sky);border:1px solid var(--blue-m);border-radius:100px;padding:4px 12px;font-size:11px;font-weight:700;color:var(--blue);margin-bottom:14px;}
.soal-text{font-family:'Syne',sans-serif;font-size:30px;font-weight:800;color:var(--tx);margin:8px 0 24px;line-height:1.3;}
.soal-hint{font-size:11px;color:var(--tx3);margin-bottom:8px;}
.ans-input{width:100%;padding:14px;background:var(--off);border:2.5px solid var(--bdr);border-radius:var(--r);font-family:'Syne',sans-serif;font-size:24px;font-weight:800;text-align:center;color:var(--tx);outline:none;transition:all .25s;margin-bottom:10px;}
.ans-input:focus{border-color:var(--blue);background:var(--wh);box-shadow:0 0 0 4px rgba(26,107,255,.08);}
.ans-input.ok{border-color:var(--green)!important;background:rgba(18,192,122,.05)!important;color:var(--green);}
.ans-input.no{border-color:var(--red)!important;background:rgba(240,64,96,.05)!important;color:var(--red);}
.check-btn{width:100%;padding:14px;background:var(--blue);color:white;border:none;border-radius:var(--r);font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;}
.check-btn:hover{background:var(--blue-d);}
.skip-btn{width:100%;padding:9px;background:transparent;border:1.5px solid var(--bdr);border-radius:var(--r);font-size:13px;font-weight:600;color:var(--tx3);cursor:pointer;margin-top:7px;transition:all .2s;}
.fb-ok{padding:13px 16px;background:var(--gbg);border:1px solid var(--gbdr);border-radius:var(--r);display:flex;align-items:center;gap:10px;margin-top:10px;}
.fb-no{padding:13px 16px;background:var(--rbg);border:1px solid var(--rbdr);border-radius:var(--r);margin-top:10px;}
.fb-label{font-size:14px;font-weight:800;}
.fb-ok-c{color:#0A8A55;}.fb-no-c{color:#C0162E;margin-bottom:8px;}
.steps-box{background:var(--off);border:1px solid var(--bdr);border-radius:var(--r);padding:14px 16px;margin-top:10px;}
.steps-title{font-size:11px;font-weight:800;color:var(--tx3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px;}
.step-row{display:flex;align-items:flex-start;gap:10px;padding:6px 0;border-bottom:1px solid var(--bdr);}
.step-row:last-child{border-bottom:none;}
.step-n{width:22px;height:22px;border-radius:6px;background:var(--blue-l);color:var(--blue);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0;margin-top:1px;}
.step-n.fin{background:var(--gbg);color:#0A8A55;}
.step-txt{font-size:13px;color:var(--tx2);line-height:1.5;}
.next-btn{width:100%;padding:13px;background:linear-gradient(120deg,var(--blue),#4D8FFF);color:white;border:none;border-radius:var(--r);font-size:15px;font-weight:700;cursor:pointer;margin-top:12px;}
.result-screen{background:var(--wh);border:1.5px solid var(--bdr);border-radius:var(--r3);padding:30px 22px;text-align:center;box-shadow:var(--sh);}
.result-icon{font-size:60px;margin-bottom:10px;}
.result-score{font-family:'Syne',sans-serif;font-size:50px;font-weight:800;color:var(--blue);line-height:1;}
.result-lbl{font-size:13px;color:var(--tx2);margin-bottom:18px;}
.result-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:18px;}
.rs{background:var(--sky);border:1px solid var(--blue-m);border-radius:var(--r);padding:12px;}
.rs-val{font-family:'Syne',sans-serif;font-size:19px;font-weight:800;color:var(--blue);}
.rs-lbl{font-size:11px;color:var(--tx3);font-weight:600;margin-top:2px;}
.poin-chip{display:inline-block;background:rgba(245,166,35,.1);border:1px solid rgba(245,166,35,.3);color:var(--gold);padding:8px 20px;border-radius:100px;font-family:'Syne',sans-serif;font-size:15px;font-weight:800;margin-bottom:20px;}
.result-actions{display:flex;gap:9px;}
.btn-pri{flex:2;padding:12px;background:var(--blue);color:white;border:none;border-radius:var(--r);font-size:14px;font-weight:700;cursor:pointer;}
.btn-sec{flex:1;padding:12px;background:var(--off);border:1.5px solid var(--bdr);border-radius:var(--r);color:var(--tx2);font-size:14px;font-weight:700;cursor:pointer;}

/* HISTORY */
.hist-row{background:var(--wh);border:1.5px solid var(--bdr);border-radius:var(--r);padding:12px 14px;display:flex;align-items:center;gap:12px;margin-bottom:7px;}
.hist-icon{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;background:var(--off);border:1px solid var(--bdr);}
.hist-info{flex:1;}.hist-topic{font-size:13px;font-weight:700;color:var(--tx);margin-bottom:2px;}
.hist-meta{font-size:11px;color:var(--tx3);}
.hist-score{text-align:right;}.hist-poin{font-family:'Syne',sans-serif;font-size:15px;font-weight:800;color:var(--blue);}
.hist-acc{font-size:11px;color:var(--tx3);}

/* TUTOR */
.monitor-banner{background:var(--wh);border:1.5px solid var(--bdr);border-radius:var(--r2);margin-bottom:20px;overflow:hidden;box-shadow:var(--sh);}
.monitor-hd{padding:14px 18px;background:linear-gradient(120deg,#EEF4FF,#F5F8FF);border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:10px;}
.monitor-hd-t{font-family:'Syne',sans-serif;font-size:14px;font-weight:800;color:var(--tx);flex:1;}
.live-badge{display:flex;align-items:center;gap:5px;background:var(--gbg);border:1px solid var(--gbdr);border-radius:100px;padding:4px 10px;font-size:11px;font-weight:800;color:#0A8A55;text-transform:uppercase;}
.live-blink{animation:blink 1s ease infinite;}
.monitor-grid{display:grid;grid-template-columns:repeat(2,1fr);}
.mc{padding:13px 16px;border-right:1px solid var(--bdr);border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:11px;transition:background .3s;}
.mc:nth-child(even){border-right:none;}.mc.active-bg{background:rgba(18,192,122,.04);}.mc.inactive-bg{background:rgba(240,64,96,.03);}
.mc-av{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:13px;font-weight:800;flex-shrink:0;}
.mc-av.green{background:var(--gbg);color:#0A8A55;border:1.5px solid var(--gbdr);}.mc-av.red{background:var(--rbg);color:#C0162E;border:1.5px solid var(--rbdr);}.mc-av.grey{background:var(--off);color:var(--tx3);border:1.5px solid var(--bdr);}
.mc-info{flex:1;min-width:0;}.mc-name{font-size:12px;font-weight:700;color:var(--tx);margin-bottom:3px;}
.mc-act{font-size:11px;font-weight:600;}.mc-act.green{color:#0A8A55;}.mc-act.red{color:#C0162E;}.mc-act.grey{color:var(--tx3);}
.mc-time{font-size:10px;color:var(--tx3);margin-top:1px;}
.sum-row{display:flex;gap:8px;padding:12px 16px;border-top:1px solid var(--bdr);background:var(--sky);}
.sum-item{flex:1;text-align:center;}.sum-num{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;}.sum-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--tx3);margin-top:1px;}
.t-stats{display:grid;grid-template-columns:repeat(2,1fr);gap:9px;margin-bottom:20px;}
.t-stat{background:var(--wh);border:1.5px solid var(--bdr);border-radius:var(--r2);padding:17px 15px;box-shadow:var(--sh);}
.t-stat-num{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:var(--blue);margin-bottom:2px;}
.t-stat-label{font-size:12px;color:var(--tx2);font-weight:600;}
.stu-list{display:flex;flex-direction:column;gap:7px;}
.stu-row{background:var(--wh);border:1.5px solid var(--bdr);border-radius:var(--r);padding:13px 15px;display:flex;align-items:center;gap:11px;cursor:pointer;transition:all .2s;}
.stu-row:hover{border-color:var(--blue);box-shadow:var(--sh);}
.stu-row.ab{border-color:var(--gbdr);}.stu-row.ib{border-color:var(--rbdr);}
.stu-av{width:40px;height:40px;border-radius:10px;background:var(--blue-l);color:var(--blue);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:14px;font-weight:800;flex-shrink:0;}
.stu-info{flex:1;}.stu-name-row{font-weight:700;font-size:14px;color:var(--tx);display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.stu-meta{font-size:11px;color:var(--tx3);margin-top:2px;}.stu-poin{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;color:var(--blue);}
.kelas-badge{font-size:10px;font-weight:800;padding:2px 8px;border-radius:100px;background:var(--blue-l);color:var(--blue);}

/* STUDENT DETAIL TUTOR */
.stu-detail-card{background:var(--wh);border:1.5px solid var(--bdr);border-radius:var(--r2);padding:20px;margin-bottom:14px;box-shadow:var(--sh);}
.hist-day-label{font-size:11px;font-weight:800;color:var(--tx3);text-transform:uppercase;letter-spacing:.6px;padding:8px 0 6px;}
.hist-empty{text-align:center;padding:30px;color:var(--tx3);font-size:13px;}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(13,27,62,.45);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px;backdrop-filter:blur(6px);}

// ACTIVITY HOOK
// ═══════════════════════════════════════════════════════════════
function useActivityReporter(userId){
  const ref=useRef(null);
  const report=useCallback((act,topicName)=>{
    if(!userId)return;
    ActivityStore.update(userId,act,topicName);
    ActivityStore.data[userId].topicName=topicName||ActivityStore.data[userId]?.topicName;
    clearTimeout(ref.current);
    ref.current=setTimeout(()=>ActivityStore.update(userId,"idle"),30000);
  },[userId]);
  useEffect(()=>{
    if(!userId)return;
    report("idle");
    const hb=setInterval(()=>{const d=ActivityStore.data[userId];if(d)ActivityStore.update(userId,d.act);},20000);
    return()=>{clearInterval(hb);clearTimeout(ref.current);};
  },[userId,report]);
  return report;
}

// ═══════════════════════════════════════════════════════════════
// ARENA WAJIB — ➕ ➖ ✖️ ➗  (wajib 1x/hari, poin adaptif)
// ═══════════════════════════════════════════════════════════════
function ArenaWajib({ op, studentPoin, onExit, onFinish, reportActivity }) {
  const TOTAL = 10;
  const topic = WAJIB_TOPICS.find(t => t.op === op);
  const lv = getLvl(studentPoin);
  // adaptLvl for soal difficulty: map tier (1-7) to soal level (1-6)
  const tierIdx = TIERS.findIndex(t => lv.lvlNum >= t.range[0] && lv.lvlNum <= t.range[1]);
  const baseSoalLvl = Math.min(6, Math.max(1, tierIdx + 1));

  const [adaptLvl, setAdaptLvl] = useState(baseSoalLvl);
  const [soal, setSoal] = useState(() => generateWajib(op, baseSoalLvl));
  const [ans, setAns] = useState("");
  const [st, setSt] = useState(null);
  const [num, setNum] = useState(1);
  const [correct, setCorrect] = useState(0);
  const [wrong, setWrong] = useState(0);
  const [streak, setStreak] = useState(0);
  const [maxStreak, setMaxStreak] = useState(0);
  const [done, setDone] = useState(false);
  const [totalPoin, setTotalPoin] = useState(0);
  const [lvlUpMsg, setLvlUpMsg] = useState(null);
  const inp = useRef();

  useEffect(() => { reportActivity("latihan", topic.nama + " (Wajib)"); }, []);
  useEffect(() => { if (st === null && inp.current) inp.current.focus(); }, [st, soal]);

  const check = () => {
    if (!ans.trim() || st !== null) return;
    reportActivity("latihan", topic.nama + " (Wajib)");
    const ok = checkAnswer(ans, soal.jawaban, soal.type);
    setSt(ok ? "ok" : "no");
    if (ok) {
      const newStreak = streak + 1;
      const newMax = Math.max(maxStreak, newStreak);
      const newAdaptLvl = Math.min(6, baseSoalLvl + Math.floor(newStreak / 3));
      if (newAdaptLvl > adaptLvl) {
        setAdaptLvl(newAdaptLvl);
        setLvlUpMsg(`🔥 Level soal naik! → ${WAJIB_LEVEL_LABEL[newAdaptLvl]}`);
        setTimeout(() => setLvlUpMsg(null), 2000);
      }
      const basePoin = getWajibPoinBase(studentPoin);
      const bonus = getStreakBonus(newStreak);
      const pt = basePoin + bonus;
      setStreak(newStreak);
      setMaxStreak(newMax);
      setCorrect(c => c + 1);
      setTotalPoin(p => p + pt);
    } else {
      setStreak(0);
      setWrong(w => w + 1);
    }
  };

  const next = () => {
    if (num >= TOTAL) { setDone(true); return; }
    setSoal(generateWajib(op, adaptLvl));
    setAns(""); setSt(null); setNum(n => n + 1);
  };
  const skip = () => {
    setStreak(0); setWrong(w => w + 1);
    setSoal(generateWajib(op, adaptLvl));
    setAns(""); setSt(null); setNum(n => n + 1);
  };

  const rTxt = txt => txt.split(/\*\*(.*?)\*\*/).map((t, i) => i % 2 === 1 ? <strong key={i}>{t}</strong> : t);

  if (done) {
    const pct = Math.round((correct / TOTAL) * 100);
    const emoji = pct >= 90 ? "🏆" : pct >= 70 ? "🎉" : pct >= 50 ? "👍" : "💪";
    return (
      <div className="result-screen sci">
        <div style={{ display:"flex", alignItems:"center", justifyContent:"center", gap:8, marginBottom:8 }}>
          <span style={{ fontSize:24 }}>{topic.icon}</span>
          <span style={{ fontFamily:"'Syne',sans-serif", fontSize:16, fontWeight:800, color:"var(--tx)" }}>{topic.nama} — Wajib Selesai!</span>
        </div>
        <div className="result-icon pi">{emoji}</div>
        <div className="result-score">{correct}/{TOTAL}</div>
        <div className="result-lbl">soal benar · {pct}%</div>
        <div className="result-stats">
          <div className="rs"><div className="rs-val" style={{color:"var(--green)"}}>{correct}</div><div className="rs-lbl">Benar</div></div>
          <div className="rs"><div className="rs-val" style={{color:"var(--red)"}}>{wrong}</div><div className="rs-lbl">Salah</div></div>
          <div className="rs"><div className="rs-val" style={{color:"var(--gold)"}}>{maxStreak}🔥</div><div className="rs-lbl">Streak</div></div>
        </div>
        <div className="poin-chip">+{totalPoin} poin</div>
        <div style={{ fontSize:12, color:"var(--green)", fontWeight:700, marginBottom:18, background:"var(--gbg)", border:"1px solid var(--gbdr)", borderRadius:"var(--r)", padding:"10px 14px" }}>
          ✅ Latihan wajib hari ini selesai! Bank Materi terbuka.
        </div>
        <div className="result-actions">
          <button className="btn-sec" onClick={() => { onFinish(totalPoin, correct, TOTAL, op); onExit(); }}>← Kembali</button>
          <button className="btn-pri" onClick={() => { setSoal(generateWajib(op, baseSoalLvl)); setAns(""); setSt(null); setNum(1); setCorrect(0); setWrong(0); setStreak(0); setMaxStreak(0); setTotalPoin(0); setAdaptLvl(baseSoalLvl); setDone(false); onFinish(totalPoin, correct, TOTAL, op); }}>Ulangi 🔄</button>
        </div>
      </div>
    );
  }

  const basePoin = getWajibPoinBase(studentPoin);
  const bonus = getStreakBonus(streak);

  return (
    <div className="arena-wrap fu">
      {/* Level up notification */}
      {lvlUpMsg && (
        <div style={{ background:"linear-gradient(120deg,#F5A623,#FF6B35)", color:"white", borderRadius:"var(--r)", padding:"10px 16px", textAlign:"center", fontWeight:800, fontSize:14, animation:"fadeUp .3s ease" }}>
          {lvlUpMsg}
        </div>
      )}

      {/* Header */}
      <div className="arena-header">
        <div className="arena-meta">
          <div>
            <div style={{ display:"flex", alignItems:"center", gap:7 }}>
              <span style={{ fontFamily:"'Syne',sans-serif", fontSize:15, fontWeight:800, color:"var(--tx)" }}>{topic.icon} {topic.nama}</span>
              <span style={{ fontSize:10, fontWeight:800, padding:"2px 8px", borderRadius:100, background: WAJIB_LEVEL_COLOR[adaptLvl]+"22", color:WAJIB_LEVEL_COLOR[adaptLvl], border:`1px solid ${WAJIB_LEVEL_COLOR[adaptLvl]}44` }}>
                {WAJIB_LEVEL_LABEL[adaptLvl]}
              </span>
            </div>
            <div style={{ fontSize:11, color:"var(--gold)", marginTop:3, fontWeight:600 }}>
              ⚡ Wajib NEO · {basePoin + bonus} poin/soal{bonus > 0 ? ` (+${bonus} streak bonus)` : ""}
            </div>
          </div>
          <div className="arena-chips">
            {streak >= 3 && <div className="streak-chip">🔥 {streak}x</div>}
            <div className="score-chip">✓{correct} ✗{wrong}</div>
            <div style={{ fontSize:12, fontWeight:700, color:"var(--tx3)" }}>{num}/{TOTAL}</div>
          </div>
        </div>
        <div className="prog-bar"><div className="prog-fill" style={{ width:`${(num/TOTAL)*100}%`, background:`linear-gradient(90deg,${topic.color},${topic.color}99)` }}/></div>
      </div>

      {/* Poin system info strip */}
      <div style={{ background:"var(--sky)", border:"1px solid var(--blue-m)", borderRadius:"var(--r)", padding:"8px 14px", display:"flex", justifyContent:"space-between", fontSize:11, fontWeight:700, color:"var(--tx2)" }}>
        <span>Tier: <strong style={{ color:lv.tier.col }}>{lv.tier.icon} {lv.tier.name} Lv.{lv.lvlNum}</strong> → +{getWajibPoinBase(studentPoin)} poin dasar</span>
        <span>🔥 3x=+3 · 5x=+5 · 7x=+8</span>
      </div>

      {/* Soal */}
      <div className="soal-card">
        <div className="soal-num-badge">Soal {num} dari {TOTAL}</div>
        <div className="soal-text" style={{ fontSize: soal.soal.length > 20 ? "24px" : "32px" }}>{soal.soal}</div>
        <input
          ref={inp}
          className={`ans-input ${st || ""} ${st === "ok" ? "ans-ok" : st === "no" ? "ans-no" : ""}`}
          value={ans} onChange={e => setAns(e.target.value)}
          onKeyDown={e => e.key === "Enter" && check()}
          disabled={st !== null} placeholder="Jawaban..." autoComplete="off"
        />
        {st === null && <>
          <button className="check-btn" style={{ background: topic.color }} onClick={check}>Periksa ✓</button>
          {num > 1 && <button className="skip-btn" onClick={skip}>Lewati →</button>}
        </>}
        {st === "ok" && (
          <div className="fb-ok">
            <span style={{ fontSize:22 }}>✅</span>
            <div style={{ flex:1 }}>
              <div className="fb-label fb-ok-c">Benar!{streak >= 3 ? ` 🔥 ${streak}x!` : ""}</div>
              <div style={{ fontSize:12, color:"#0A8A55" }}>+{basePoin + getStreakBonus(streak)} poin{getStreakBonus(streak) > 0 ? ` (termasuk +${getStreakBonus(streak)} streak bonus)` : ""}</div>
            </div>
            <button className="next-btn" style={{ flex:"none", width:"auto", padding:"10px 16px", marginTop:0, fontSize:13 }} onClick={next}>
              {num >= TOTAL ? "Hasil →" : "Lanjut →"}
            </button>
          </div>
        )}
        {st === "no" && (
          <div className="fb-no">
            <div className="fb-label fb-no-c">✗ Salah. Yuk lihat langkahnya:</div>
            {soal.steps?.length > 0 && (
              <div className="steps-box">
                <div className="steps-title">Pembahasan</div>
                {soal.steps.map((step, i) => (
                  <div key={i} className="step-row">
                    <div className={`step-n ${step.startsWith("✅") ? "fin" : ""}`}>{step.startsWith("✅") ? "✓" : i + 1}</div>
                    <div className="step-txt">{rTxt(step.replace("✅ ", ""))}</div>
                  </div>
                ))}
              </div>
            )}
            <button className="next-btn" onClick={next}>{num >= TOTAL ? "Lihat Hasil →" : "Soal Berikutnya →"}</button>
          </div>
        )}
      </div>
    </div>
  );
}

// ARENA COMPONENT
// ═══════════════════════════════════════════════════════════════
function Arena({topic, onExit, onFinish, reportActivity}){
  const TOTAL=10;
  const [soal,setSoal]=useState(()=>generateSoal(topic));
  const [ans,setAns]=useState("");
  const [st,setSt]=useState(null);
  const [num,setNum]=useState(1);
  const [correct,setCorrect]=useState(0);
  const [wrong,setWrong]=useState(0);
  const [streak,setStreak]=useState(0);
  const [maxStreak,setMaxStreak]=useState(0);
  const [done,setDone]=useState(false);
  const [totalPoin,setTotalPoin]=useState(0);
  const inp=useRef();

  useEffect(()=>{reportActivity("latihan",topic.nama);},[]);
  useEffect(()=>{if(st===null&&inp.current)inp.current.focus();},[st,soal]);

  const check=()=>{
    if(!ans.trim()||st!==null)return;
    reportActivity("latihan",topic.nama);
    const ok=checkAnswer(ans,soal.jawaban,soal.type);
    setSt(ok?"ok":"no");
    if(ok){const pt=topic.poin+(streak>=3?5:streak>=2?3:0);setCorrect(c=>c+1);setStreak(s=>{const ns=s+1;setMaxStreak(m=>Math.max(m,ns));return ns;});setTotalPoin(p=>p+pt);}
    else{setWrong(w=>w+1);setStreak(0);}
  };

  const next=()=>{
    if(num>=TOTAL){setDone(true);return;}
    setSoal(generateSoal(topic));setAns("");setSt(null);setNum(n=>n+1);
  };

  const skip=()=>{setWrong(w=>w+1);setStreak(0);setSoal(generateSoal(topic));setAns("");setSt(null);setNum(n=>n+1);};

  const rStepTxt=txt=>{const p=txt.split(/\*\*(.*?)\*\*/);return p.map((t,i)=>i%2===1?<strong key={i}>{t}</strong>:t);};

  if(done){
    const pct=Math.round((correct/TOTAL)*100);
    const emoji=pct>=90?"🏆":pct>=70?"🎉":pct>=50?"👍":"💪";
    return(
      <div className="result-screen sci">
        <div className="result-icon pi">{emoji}</div>
        <div className="result-score">{correct}/{TOTAL}</div>
        <div className="result-lbl">soal benar · {pct}%</div>
        <div className="result-stats">
          <div className="rs"><div className="rs-val" style={{color:"var(--green)"}}>{correct}</div><div className="rs-lbl">Benar</div></div>
          <div className="rs"><div className="rs-val" style={{color:"var(--red)"}}>{wrong}</div><div className="rs-lbl">Salah</div></div>
          <div className="rs"><div className="rs-val" style={{color:"var(--gold)"}}>{maxStreak}🔥</div><div className="rs-lbl">Streak</div></div>
        </div>
        <div className="poin-chip">+{totalPoin} poin</div>
        <div className="result-actions">
          <button className="btn-sec" onClick={()=>{onFinish(totalPoin,correct,TOTAL);onExit();}}>← Pilih Topik</button>
          <button className="btn-pri" onClick={()=>{setSoal(generateSoal(topic));setAns("");setSt(null);setNum(1);setCorrect(0);setWrong(0);setStreak(0);setMaxStreak(0);setTotalPoin(0);setDone(false);onFinish(totalPoin,correct,TOTAL);}}>Ulangi 🔄</button>
        </div>
      </div>
    );
  }

  return(
    <div className="arena-wrap fu">
      <div className="arena-header">
        <div className="arena-meta">
          <div>
            <div className="arena-topic">{topic.icon} {topic.nama}</div>
            <div style={{fontSize:11,color:"var(--tx3)",marginTop:3}}>{topic.tag}</div>
          </div>
          <div className="arena-chips">
            {streak>=2&&<div className="streak-chip">🔥 {streak}x</div>}
            <div className="score-chip">✓{correct} ✗{wrong}</div>
            <div style={{fontSize:12,fontWeight:700,color:"var(--tx3)"}}>{num}/{TOTAL}</div>
          </div>
        </div>
        <div className="prog-bar"><div className="prog-fill" style={{width:`${(num/TOTAL)*100}%`}}/></div>
      </div>

      <div className="soal-card">
        <div className="soal-num-badge">Soal {num} dari {TOTAL}</div>
        <div className="soal-text">{soal.soal}</div>
        {soal.type==="fraction"&&<div className="soal-hint">Jawab contoh: 3/4 atau angka bulat</div>}
        {soal.type==="sign"&&<div className="soal-hint">Jawab: &gt; atau &lt; atau =</div>}
        {soal.type==="text"&&<div className="soal-hint">Jawab: lancip / siku-siku / tumpul</div>}
        <input ref={inp} className={`ans-input ${st||""} ${st==="ok"?"ans-ok":st==="no"?"ans-no":""}`}
          value={ans} onChange={e=>setAns(e.target.value)} onKeyDown={e=>e.key==="Enter"&&check()} disabled={st!==null} placeholder="Jawaban..." autoComplete="off"/>
        {st===null&&<>
          <button className="check-btn" onClick={check}>Periksa ✓</button>
          {num>1&&<button className="skip-btn" onClick={skip}>Lewati →</button>}
        </>}
        {st==="ok"&&(
          <div className="fb-ok">
            <span style={{fontSize:22}}>✅</span>
            <div style={{flex:1}}>
              <div className="fb-label fb-ok-c">Benar!{streak>=2?` 🔥 ${streak}x streak!`:""}</div>
              <div style={{fontSize:12,color:"#0A8A55"}}>+{topic.poin+(streak>=3?5:streak>=2?3:0)} poin</div>
            </div>
            <button className="next-btn" style={{flex:"none",width:"auto",padding:"10px 16px",marginTop:0,fontSize:13}} onClick={next}>
              {num>=TOTAL?"Hasil →":"Lanjut →"}
            </button>
          </div>
        )}
        {st==="no"&&(
          <div className="fb-no">
            <div className="fb-label fb-no-c">✗ Salah. Yuk pahami langkahnya:</div>
            {soal.steps?.length>0&&(
              <div className="steps-box">
                <div className="steps-title">Pembahasan Langkah demi Langkah</div>
                {soal.steps.map((step,i)=>(
                  <div key={i} className="step-row">
                    <div className={`step-n ${step.startsWith("✅")?"fin":""}`}>{step.startsWith("✅")?"✓":i+1}</div>
                    <div className="step-txt">{rStepTxt(step.replace("✅ ",""))}</div>
                  </div>
                ))}
              </div>
            )}
            <button className="next-btn" onClick={next}>{num>=TOTAL?"Lihat Hasil →":"Soal Berikutnya →"}</button>
          </div>
        )}
      </div>
    </div>
  );
}

// MONITORING PANEL
// ═══════════════════════════════════════════════════════════════
function MonitoringPanel({students}){
  const [snap,setSnap]=useState(ActivityStore.snap());
  useEffect(()=>{
    const unsub=ActivityStore.subscribe(d=>setSnap({...d}));
    const iv=setInterval(()=>setSnap(ActivityStore.snap()),5000);
    return()=>{unsub();clearInterval(iv);};
  },[]);
  const sts=students.map(s=>({...s,info:getStatusInfo(snap[s.id]),lastSeen:snap[s.id]?.lastSeen}));
  const ac=sts.filter(s=>s.info.color==="green").length;
  const rc=sts.filter(s=>s.info.color==="red").length;
  const gc=sts.filter(s=>s.info.color==="grey").length;
  return(
    <div className="monitor-banner fu1">
      <div className="monitor-hd">
        <div style={{display:"flex",alignItems:"center",gap:8,flex:1}}>
          <span style={{width:18,height:18,color:"var(--blue)",display:"flex"}}><IcoChart/></span>

  );
}

// STUDENT APP
// ═══════════════════════════════════════════════════════════════
function StudentApp({user,onLogout}){
  const [tab,setTab]=useState("home");
  const [activeTopic,setActiveTopic]=useState(null);
  const [activeWajib,setActiveWajib]=useState(null);
  const [poin,setPoin]=useState(user.poin);
  const [history,setHistory]=useState([]);
  const lv=getLvl(poin);
  const reportActivity=useActivityReporter(user.id);

  useEffect(()=>{reportActivity("idle");},[tab]);

  const [statusInfo,setStatusInfo]=useState(getStatusInfo(ActivityStore.data[user.id]));
  useEffect(()=>{
    const unsub=ActivityStore.subscribe(d=>setStatusInfo(getStatusInfo(d[user.id])));
    const iv=setInterval(()=>setStatusInfo(getStatusInfo(ActivityStore.data[user.id])),5000);
    return()=>{unsub();clearInterval(iv);};
  },[user.id]);

  // ── Wajib state: track which ops done today ──────────────────
  const [wajibDone,setWajibDone]=useState({}); // {tambah:timestamp, kurang:ts, ...}
  const todayWajibCount = WAJIB_TOPICS.filter(t=>isTodayDone(wajibDone[t.op])).length;
  const wajibAllDone = todayWajibCount >= 1; // cukup 1 op selesai untuk buka bank materi

  // recent topics (last 3 unique) from bank materi
  const recentTopicIds=[...new Set(history.filter(h=>!h.isWajib).slice(0,10).map(h=>h.topicId))].slice(0,3);

  const handleFinishBank=(pt,correct,total)=>{
    setPoin(p=>p+pt);
    const entry={topicId:activeTopic.id,topicName:activeTopic.nama,topicIcon:activeTopic.icon,correct,total,poin:pt,isWajib:false,timestamp:Date.now()};
    setHistory(h=>[entry,...h].slice(0,50));
    HistoryStore.add(user.id,entry);
  };

  const handleFinishWajib=(pt,correct,total,op)=>{
    setPoin(p=>p+pt);
    const topic=WAJIB_TOPICS.find(t=>t.op===op);
    const entry={topicId:"wajib-"+op,topicName:topic.nama+" (Wajib)",topicIcon:topic.icon,correct,total,poin:pt,isWajib:true,timestamp:Date.now()};
    setHistory(h=>[entry,...h].slice(0,50));
    HistoryStore.add(user.id,entry);
    setWajibDone(d=>({...d,[op]:Date.now()}));
  };

  // ── Arena Wajib screen ──────────────────────────────────────
  if(activeWajib) return(
    <div className="shell">
      <div className="topbar"><NeoLogo/><div className="topbar-sp"/><button className="logout-btn" onClick={()=>{reportActivity("idle");setActiveWajib(null);}}>✕ Tutup</button></div>
      <div className={`sbar ${statusInfo.color==="green"?"active":"inactive"}`}><StatusDot color={statusInfo.color}/><span>{statusInfo.color==="green"?"Aktif terlihat tutor ✓":"Tidak aktif — tutor dapat melihat ini"}</span></div>
      <div className="page">
        <button className="back-btn" onClick={()=>{reportActivity("idle");setActiveWajib(null);}}><span style={{width:16,height:16,display:"flex"}}><IcoChevL/></span> Kembali</button>
        <ArenaWajib op={activeWajib} studentPoin={poin} reportActivity={reportActivity}
          onExit={()=>{reportActivity("idle");setActiveWajib(null);}}
          onFinish={handleFinishWajib}/>
      </div>
    </div>
  );

  // ── Arena Bank Materi screen ────────────────────────────────
  if(activeTopic) return(
    <div className="shell">
      <div className="topbar"><NeoLogo/><div className="topbar-sp"/><button className="logout-btn" onClick={()=>{reportActivity("idle");setActiveTopic(null);}}>✕ Tutup</button></div>
      <div className={`sbar ${statusInfo.color==="green"?"active":"inactive"}`}><StatusDot color={statusInfo.color}/><span>{statusInfo.color==="green"?"Aktif terlihat tutor ✓":"Tidak aktif — tutor dapat melihat ini"}</span></div>
      <div className="page">
        <button className="back-btn" onClick={()=>{reportActivity("idle");setActiveTopic(null);}}><span style={{width:16,height:16,display:"flex"}}><IcoChevL/></span> Pilih Topik</button>
        <Arena topic={activeTopic} reportActivity={reportActivity} onExit={()=>{reportActivity("idle");setActiveTopic(null);}} onFinish={handleFinishBank}/>
      </div>
    </div>
  );

  return(
    <div className="shell">
      <div className="topbar"><NeoLogo/><div className="topbar-sp"/><div className="uchip"><div className="uchip-av">{user.name[0]}</div><span className="uchip-name">{user.name.split(" ")[0]}</span></div><button className="logout-btn" onClick={onLogout}>Keluar</button></div>
      <div className={`sbar ${statusInfo.color==="green"?"active":"inactive"}`}><StatusDot color={statusInfo.color}/><span>{statusInfo.color==="green"?"Status kamu terlihat Aktif oleh tutor ✓":"Tidak aktif lebih dari 2 menit — tutor dapat melihat ini"}</span></div>

    </div>
