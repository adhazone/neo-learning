// TUTOR APP — Full student management + level settings
// ═══════════════════════════════════════════════════════════════
function TutorApp({onLogout}){
  const [students,setStudents]=useState(DEFAULT_STUDENTS);
  const [tab,setTab]=useState("dashboard");
  const [selStu,setSelStu]=useState(null);
  const [snap,setSnap]=useState(ActivityStore.snap());
  const [histSnap,setHistSnap]=useState({});
  const [lvSettings,setLvSettings]=useState(LevelSettings.get());
  const [showAdd,setShowAdd]=useState(false);
  const [showSettings,setShowSettings]=useState(false);
  const [showEdit,setShowEdit]=useState(null); // student obj
  const [showDel,setShowDel]=useState(null);
  const [form,setForm]=useState({name:"",username:"",password:"",startLevel:1});
  const [settingsForm,setSettingsForm]=useState({poinPerLevel:100,startLevel:1});
  const [formErr,setFormErr]=useState("");

  useEffect(()=>{
    const u1=ActivityStore.subscribe(d=>setSnap({...d}));
    const u2=HistoryStore.subscribe(d=>setHistSnap({...d}));
    const u3=LevelSettings.subscribe(d=>setLvSettings({...d}));
    const iv=setInterval(()=>setSnap(ActivityStore.snap()),5000);
    return()=>{u1();u2();u3();clearInterval(iv);};
  },[]);

  const addStudent=()=>{
    setFormErr("");
    if(!form.name.trim()||!form.username.trim()||!form.password.trim()){setFormErr("Nama, username, dan password wajib diisi");return;}
    if(students.find(s=>s.username===form.username.trim())){setFormErr("Username sudah dipakai");return;}
    const startLvl=Math.max(1,Math.min(31,Number(form.startLevel)||1));
    const startPoin=(startLvl-1)*lvSettings.poinPerLevel;
    setStudents(p=>[...p,{id:Date.now(),name:form.name.trim(),username:form.username.trim(),password:form.password.trim(),poin:startPoin,startLevel:startLvl}]);
    setForm({name:"",username:"",password:"",startLevel:1});
    setShowAdd(false);
  };

  const saveEdit=()=>{
    setFormErr("");
    if(!showEdit.name.trim()||!showEdit.username.trim()||!showEdit.password.trim()){setFormErr("Nama, username, dan password wajib diisi");return;}
    if(students.find(s=>s.username===showEdit.username.trim()&&s.id!==showEdit.id)){setFormErr("Username sudah dipakai");return;}
    const startLvl=Math.max(1,Math.min(31,Number(showEdit.startLevel)||1));
    const poinForLevel=(startLvl-1)*lvSettings.poinPerLevel;
    setStudents(p=>p.map(s=>s.id===showEdit.id?{...showEdit,startLevel:startLvl,poin:Math.max(poinForLevel,showEdit.poin)}:s));
    if(selStu?.id===showEdit.id) setSelStu({...showEdit,startLevel:startLvl});
    setShowEdit(null);
  };

  const deleteStudent=(id)=>{
    setStudents(p=>p.filter(s=>s.id!==id));
    if(selStu?.id===id)setSelStu(null);
    setShowDel(null);
  };

  const saveSettings=()=>{
    const ppv=Math.max(10,Math.min(1000,Number(settingsForm.poinPerLevel)||100));
    const sl=Math.max(1,Math.min(31,Number(settingsForm.startLevel)||1));
    LevelSettings.set({poinPerLevel:ppv,startLevel:sl});
    setShowSettings(false);
  };

  // ── STUDENT DETAIL ──
  if(selStu){
    const s=students.find(x=>x.id===selStu.id)||selStu;
    const si=getStatusInfo(snap[s.id]);
    const lv=getLvl(s.poin);
    const hist=histSnap[s.id]||[];
    const topicFreq={};
    hist.forEach(h=>{topicFreq[h.topicId]=(topicFreq[h.topicId]||0)+1;});
    const topTopics=Object.entries(topicFreq).sort((a,b)=>b[1]-a[1]).slice(0,5);
    return(
      <div className="shell">
        <div className="topbar"><NeoLogo/><div className="topbar-sp"/>
          <button className="logout-btn" style={{marginRight:6}} onClick={()=>setShowEdit({...s})}>✏️ Edit</button>
          <button className="logout-btn" style={{borderColor:"rgba(240,64,96,.3)",color:"var(--red)"}} onClick={()=>setShowDel(s.id)}>🗑️</button>
          <button className="logout-btn" style={{marginLeft:6}} onClick={()=>setSelStu(null)}>← Kembali</button>
        </div>
        <div className="page">
          {/* Student header card */}
          <div className="stu-detail-card fu" style={{borderLeft:`4px solid ${lv.tier.col}`}}>
            <div style={{display:"flex",alignItems:"center",gap:13}}>
              <div style={{width:52,height:52,borderRadius:12,background:lv.tier.col,color:"white",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}>{lv.tier.icon}</div>
              <div style={{flex:1}}>
                <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:16}}>{s.name}</div>
                <div style={{fontSize:12,color:"var(--tx2)",marginTop:2}}>@{s.username}</div>
                <div style={{marginTop:5,display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                  <span className={`spill ${si.color}`}><StatusDot color={si.color}/>{si.label}</span>
                  <span style={{fontSize:11,fontWeight:800,color:lv.tier.col}}>{lv.tier.icon} {lv.tier.name} Lv.{lv.lvlNum}</span>
                  <span style={{fontSize:11,color:"var(--tx3)"}}>{lv.tier.desc}</span>
                </div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontFamily:"'Syne',sans-serif",fontSize:22,fontWeight:800,color:lv.tier.col}}>{s.poin}</div>
                <div style={{fontSize:10,color:"var(--tx3)"}}>POIN</div>
              </div>
            </div>
            {/* Level progress */}
            <div style={{marginTop:12,padding:"10px 12px",background:lv.tier.bg,borderRadius:"var(--r)"}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
                <span style={{fontSize:11,fontWeight:700,color:lv.tier.col}}>{lv.isMythic?"⚡ Mythic Max":lv.pct+"% menuju Lv."+lv.nextLvl}</span>
                <span style={{fontSize:11,color:"var(--tx3)"}}>{lv.isMythic?"🏆":lv.poinToNext+" poin lagi"}</span>
              </div>
              <div style={{height:6,background:"rgba(0,0,0,.08)",borderRadius:100}}>
                <div style={{height:"100%",width:`${lv.pct}%`,background:lv.tier.col,borderRadius:100}}/>
              </div>
            </div>
          </div>

          {/* Topic stats */}
          <div className="sec-hd fu1"><div className="sec-hd-t">📊 Topik yang Sering Dipelajari</div><div className="sec-hd-line"/></div>
          {topTopics.length===0?(
            <div style={{background:"var(--wh)",border:"1.5px solid var(--bdr)",borderRadius:"var(--r)",padding:"20px",textAlign:"center",color:"var(--tx3)",fontSize:13,marginBottom:16}}>Belum ada riwayat latihan</div>
          ):(
            <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:20}}>
              {topTopics.map(([tid,freq])=>{
                const isWajib=tid.startsWith("wajib-");
                const t=isWajib?WAJIB_TOPICS.find(w=>"wajib-"+w.op===tid):BANK.find(b=>b.id===tid);
                if(!t)return null;
                const topicHist=hist.filter(h=>h.topicId===tid);
                const avgAcc=Math.round(topicHist.reduce((a,h)=>a+(h.correct/h.total),0)/topicHist.length*100);
                return(
                  <div key={tid} style={{background:"var(--wh)",border:"1.5px solid var(--bdr)",borderRadius:"var(--r)",padding:"12px 14px",display:"flex",alignItems:"center",gap:12}}>
                    <div style={{width:36,height:36,borderRadius:9,background:isWajib?"rgba(26,107,255,.08)":"var(--off)",border:`1px solid ${isWajib?"var(--blue-m)":"var(--bdr)"}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>{t.icon}</div>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:700,fontSize:13,display:"flex",alignItems:"center",gap:5}}>
                        {isWajib&&<span style={{fontSize:9,fontWeight:800,background:"var(--blue)",color:"white",padding:"2px 6px",borderRadius:100}}>WAJIB</span>}
                        {isWajib?t.nama+" (Wajib)":t.nama}
                      </div>
                      <div style={{fontSize:11,color:"var(--tx3)",marginTop:2}}>{freq}x latihan · rata-rata {avgAcc}% benar</div>
                    </div>
                    <div style={{fontFamily:"'Syne',sans-serif",fontSize:15,fontWeight:800,color:avgAcc>=80?"var(--green)":avgAcc>=60?"var(--gold)":"var(--red)"}}>{avgAcc}%</div>
                  </div>
                );
              })}
            </div>
          )}

          {/* Full history */}
          <div className="sec-hd fu2"><div className="sec-hd-t">📋 Riwayat Lengkap</div><div className="sec-hd-line"/><span style={{fontSize:11,color:"var(--tx3)"}}>{hist.length} sesi</span></div>
          {hist.length===0?(
            <div className="hist-empty">Siswa ini belum pernah latihan</div>
          ):(
            hist.map((h,i)=>{
              const showDate=i===0||new Date(h.timestamp).toDateString()!==new Date(hist[i-1]?.timestamp).toDateString();
              return(
                  <div key={i}>
                    {showDate&&<div className="hist-day-label">{new Date(h.timestamp).toLocaleDateString("id-ID",{weekday:"long",day:"numeric",month:"long"})}</div>}
                    <div className="hist-row">
                      <div className="hist-icon">{h.topicIcon||"📚"}</div>
                      <div className="hist-info">
                        <div className="hist-topic" style={{display:"flex",alignItems:"center",gap:5}}>
                          {h.isWajib&&<span style={{fontSize:9,fontWeight:800,background:"var(--blue)",color:"white",padding:"2px 6px",borderRadius:100}}>WAJIB</span>}
                          {h.topicName}
                        </div>
                        <div className="hist-meta">{formatDate(h.timestamp)}</div>
                      </div>
                      <div className="hist-score">
                        <div className="hist-poin">+{h.poin}</div>
                        <div className="hist-acc" style={{color:h.correct/h.total>=0.8?"var(--green)":h.correct/h.total>=0.6?"var(--gold)":"var(--red)"}}>{h.correct}/{h.total}</div>
                      </div>
                    </div>
                  </div>
              );
            })
          )}
        </div>

        {/* Edit modal */}
        {showEdit&&(
          <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&setShowEdit(null)}>
            <div className="modal-box sci">
              <div className="modal-title">✏️ Edit Data Siswa</div>
              {formErr&&<div className="login-err">{formErr}</div>}
              {[{f:"name",l:"Nama Lengkap",t:"text"},{f:"username",l:"Username",t:"text"},{f:"password",l:"Password",t:"password"}].map(({f,l,t})=>(
                <div className="field" key={f}><label>{l}</label><input type={t} value={showEdit[f]||""} onChange={e=>setShowEdit(x=>({...x,[f]:e.target.value}))}/></div>
              ))}
              <div className="field">
                <label>Set Level Awal (1–31)</label>
                <input type="number" min={1} max={31} value={showEdit.startLevel||1} onChange={e=>setShowEdit(x=>({...x,startLevel:e.target.value}))}/>
                <div style={{fontSize:11,color:"var(--tx3)",marginTop:4}}>
                  Level {showEdit.startLevel||1} = {getTier(Number(showEdit.startLevel)||1).icon} {getTier(Number(showEdit.startLevel)||1).name} · Poin awal: {(Math.max(1,Number(showEdit.startLevel)||1)-1)*lvSettings.poinPerLevel}
                </div>
              </div>
              <div className="modal-acts">
                <button className="m-cancel" onClick={()=>{setShowEdit(null);setFormErr("");}}>Batal</button>
                <button className="m-ok" onClick={saveEdit}>Simpan Perubahan</button>
              </div>
            </div>
          </div>
        )}

        {/* Delete confirm */}
        {showDel&&(
          <div className="modal-bg">
            <div className="modal-box sci" style={{maxWidth:360}}>
              <div className="modal-title">Hapus Siswa?</div>
              <p style={{fontSize:14,color:"var(--tx2)",lineHeight:1.7}}>Data <strong style={{color:"var(--tx)"}}>{s.name}</strong> akan dihapus permanen.</p>
              <div className="modal-acts">
                <button className="m-cancel" onClick={()=>setShowDel(null)}>Batal</button>
                <button style={{flex:1,padding:12,background:"rgba(240,64,96,.08)",border:"1.5px solid rgba(240,64,96,.3)",borderRadius:"var(--r)",color:"var(--red)",fontWeight:700,fontSize:14,cursor:"pointer"}} onClick={()=>deleteStudent(s.id)}>Hapus</button>
              </div>
            </div>
          </div>
        )}
      </div>
    );
  }

  // ── MAIN TUTOR VIEW ──
  return(
    <div className="shell">
      <div className="topbar"><NeoLogo/><div className="topbar-sp"/>
        <button className="logout-btn" style={{marginRight:6}} onClick={()=>{setSettingsForm({poinPerLevel:lvSettings.poinPerLevel,startLevel:lvSettings.startLevel});setShowSettings(true);}}>⚙️ Pengaturan</button>
        <div className="uchip"><div className="uchip-av">T</div><span className="uchip-name">Tutor</span></div>
        <button className="logout-btn" onClick={onLogout}>Keluar</button>
      </div>
      <div className="page">

        {tab==="dashboard"&&<>
          <div className="pg-title fu">Dashboard Tutor</div>
          <div className="pg-sub fu1">Pantau keaktifan & progres siswa real-time</div>
          <MonitoringPanel students={students}/>

          {/* Settings summary */}
          <div style={{background:"linear-gradient(120deg,#EEF4FF,#F5F8FF)",border:"1.5px solid var(--blue-m)",borderRadius:"var(--r)",padding:"12px 16px",marginBottom:18,display:"flex",gap:12,alignItems:"center",flexWrap:"wrap"}} className="fu2">
            <div style={{flex:1}}>
              <div style={{fontSize:12,fontWeight:800,color:"var(--blue)",marginBottom:2}}>⚙️ Pengaturan Level Aktif</div>
              <div style={{fontSize:11,color:"var(--tx2)"}}>
                <strong>{lvSettings.poinPerLevel} poin</strong> per naik level · Level awal default: <strong>Lv.{lvSettings.startLevel} ({getTier(lvSettings.startLevel).name})</strong>
              </div>
            </div>
            <button onClick={()=>{setSettingsForm({poinPerLevel:lvSettings.poinPerLevel,startLevel:lvSettings.startLevel});setShowSettings(true);}}
              style={{padding:"7px 14px",background:"var(--blue)",color:"white",border:"none",borderRadius:"var(--r)",fontSize:12,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap"}}>
              Ubah
            </button>
          </div>

          <div className="t-stats fu2">
            <div className="t-stat"><div className="t-stat-num">{students.length}</div><div className="t-stat-label">Total Siswa</div></div>
            <div className="t-stat"><div className="t-stat-num">{BANK.length}</div><div className="t-stat-label">Topik Bank</div></div>
            <div className="t-stat"><div className="t-stat-num" style={{color:"var(--green)"}}>{Object.values(histSnap).flat().length}</div><div className="t-stat-label">Sesi Latihan</div></div>
            <div className="t-stat"><div className="t-stat-num" style={{color:"var(--gold)"}}>{lvSettings.poinPerLevel}</div><div className="t-stat-label">Poin/Level</div></div>
          </div>

          <div className="sec-hd fu3"><div className="sec-hd-t">👥 Daftar Siswa</div><div className="sec-hd-line"/><span style={{fontSize:11,color:"var(--blue)",fontWeight:700,cursor:"pointer"}} onClick={()=>setShowAdd(true)}>+ Tambah</span></div>
          <div className="stu-list fu4">
            {students.map(s=>{
              const si=getStatusInfo(snap[s.id]);
              const lv=getLvl(s.poin);
              const hist=histSnap[s.id]||[];
              const lastTopic=hist[0];
              return(
                <div key={s.id} className={`stu-row ${si.color==="green"?"ab":si.color==="red"?"ib":""}`} onClick={()=>setSelStu(s)}>
                  <div className="stu-av" style={{background:lv.tier.col+"22",color:lv.tier.col,border:`1.5px solid ${lv.tier.col}44`,fontSize:18}}>{lv.tier.icon}</div>
                  <div className="stu-info">
                    <div className="stu-name-row">
                      {s.name}
                      <span style={{fontSize:10,fontWeight:800,padding:"2px 7px",borderRadius:100,background:lv.tier.col+"22",color:lv.tier.col}}>{lv.tier.name} Lv.{lv.lvlNum}</span>
                      <span className={`spill ${si.color}`}><StatusDot color={si.color}/>{si.label}</span>
                    </div>
                    <div className="stu-meta">
                      {lastTopic?`Terakhir: ${lastTopic.topicName} (${timeAgo(lastTopic.timestamp)})`:"Belum ada riwayat"} · {hist.length} sesi
                    </div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div className="stu-poin" style={{color:lv.tier.col}}>{s.poin}</div>
                    <div style={{fontSize:10,color:"var(--tx3)"}}>poin</div>
                  </div>
                  <div style={{color:"var(--tx3)",width:16,height:16}}><IcoChevR/></div>
                </div>
              );
            })}
          </div>
        </>}

        {tab==="bank"&&<>
          <div className="pg-title fu">Bank Materi</div>
          <div className="pg-sub fu1">{BANK.length} topik · 4 jenjang · bebas pilih</div>
          {JENJANG_META.map((jm,ji)=>(
            <div key={jm.j} className={`jenjang-section fu${ji+1}`}>
              <div className="jenjang-header" style={{background:jm.bg}}>
                <div style={{width:28,height:28,borderRadius:8,background:jm.color,display:"flex",alignItems:"center",justifyContent:"center",color:"white",fontFamily:"'Syne',sans-serif",fontSize:13,fontWeight:800}}>J{jm.j}</div>
                <div><div className="jenjang-num" style={{color:jm.color}}>Jenjang {jm.j}</div><div className="jenjang-name" style={{color:jm.color}}>{jm.label}</div></div>
              </div>
              <div className="topics-grid">
                {BANK.filter(b=>b.jenjang===jm.j).map(t=>{
                  const allHist=Object.values(histSnap).flat();
                  const topicSessions=allHist.filter(h=>h.topicId===t.id);
                  return(
                    <div key={t.id} className="topic-card" style={{cursor:"default"}}>
                      <div className="topic-accent" style={{background:t.color}}/>
                      <span className="topic-icon-big">{t.icon}</span>
                      <div className="topic-name">{t.nama}</div>
                      <div className="topic-tag">{t.tag}</div>
                      <span className="panduan-badge">{t.panduan}</span>
                      {topicSessions.length>0&&<div style={{fontSize:10,color:"var(--tx3)",marginTop:5}}>{topicSessions.length} sesi</div>}
                    </div>
                  );
                })}
              </div>
            </div>
          ))}
        </>}

        {tab==="ranking"&&<>
          <div className="pg-title fu">Leaderboard</div>
          <div className="pg-sub fu1">Peringkat berdasarkan total poin</div>

          {/* Tier legend */}
          <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:16}} className="fu2">
            {TIERS.map(t=>(
              <div key={t.name} style={{display:"flex",alignItems:"center",gap:5,background:t.bg,border:`1px solid ${t.col}33`,borderRadius:100,padding:"4px 10px",fontSize:11,fontWeight:700,color:t.col}}>
                {t.icon} {t.name}
              </div>
            ))}
          </div>

          <div className="fu3">
            {[...students].sort((a,b)=>b.poin-a.poin).map((s,i)=>{
              const lv=getLvl(s.poin); const hist=histSnap[s.id]||[];
              return(
                <div key={s.id} className="lb-row" style={{borderLeft:`3px solid ${lv.tier.col}`}}>
                  <div className="lb-rank" style={{color:i===0?"#F5A623":i===1?"#8A9ABB":i===2?"#A0620A":"var(--tx3)"}}>{i===0?"🥇":i===1?"🥈":i===2?"🥉":i+1}</div>
                  <div style={{width:36,height:36,borderRadius:9,background:lv.tier.col+"22",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>{lv.tier.icon}</div>
                  <div className="lb-info">
                    <div className="lb-name">{s.name}</div>
                    <div className="lb-sub" style={{color:lv.tier.col,fontWeight:700}}>{lv.tier.name} Lv.{lv.lvlNum} · {hist.length} sesi</div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div className="lb-poin" style={{color:lv.tier.col}}>{s.poin}</div>
                    <div style={{fontSize:10,color:"var(--tx3)"}}>poin</div>
                  </div>
                </div>
              );
            })}
          </div>
        </>}
      </div>

      <button className="fab" onClick={()=>{setFormErr("");setForm({name:"",username:"",password:"",startLevel:lvSettings.startLevel});setShowAdd(true);}}><IcoPlus/></button>
      <nav className="bot-nav">
        {[{k:"dashboard",l:"Dashboard",ic:<IcoUsers/>},{k:"bank",l:"Bank Materi",ic:<IcoGrid/>},{k:"ranking",l:"Ranking",ic:<IcoChart/>}].map(n=>(
          <button key={n.k} className={`bot-btn ${tab===n.k?"on":""}`} onClick={()=>setTab(n.k)}>{n.ic}{n.l}{tab===n.k&&<div className="nb-dot"/>}</button>
        ))}
      </nav>

      {/* ── MODAL: Add Student ── */}
      {showAdd&&<div className="modal-bg" onClick={e=>e.target===e.currentTarget&&setShowAdd(false)}>
        <div className="modal-box sci">
          <div className="modal-title">➕ Tambah Siswa Baru</div>
          {formErr&&<div className="login-err">{formErr}</div>}
          {[{f:"name",l:"Nama Lengkap",p:"contoh: Andi Pratama",t:"text"},{f:"username",l:"Username",p:"contoh: andi123",t:"text"},{f:"password",l:"Password",p:"kata sandi siswa",t:"password"}].map(({f,l,p,t})=>(
            <div className="field" key={f}><label>{l}</label><input type={t} value={form[f]} onChange={e=>setForm(x=>({...x,[f]:e.target.value}))} placeholder={p}/></div>
          ))}
          <div className="field">
            <label>Level Awal (1–31)</label>
            <input type="number" min={1} max={31} value={form.startLevel} onChange={e=>setForm(x=>({...x,startLevel:e.target.value}))}/>
            <div style={{marginTop:6,background:"var(--sky)",border:"1px solid var(--blue-m)",borderRadius:"var(--r)",padding:"8px 12px",fontSize:12}}>
              {(() => {
                const lvNum=Math.max(1,Math.min(31,Number(form.startLevel)||1));
                const tier=getTier(lvNum);
                return <span style={{fontWeight:700,color:tier.col}}>{tier.icon} {tier.name} Lv.{lvNum} — {tier.desc} · Mulai dengan {(lvNum-1)*lvSettings.poinPerLevel} poin</span>;
              })()}
            </div>
          </div>
          <div className="modal-acts">
            <button className="m-cancel" onClick={()=>{setShowAdd(false);setFormErr("");}}>Batal</button>
            <button className="m-ok" onClick={addStudent}>Tambah Siswa →</button>
          </div>
        </div>
      </div>}

      {/* ── MODAL: Level Settings ── */}
      {showSettings&&<div className="modal-bg" onClick={e=>e.target===e.currentTarget&&setShowSettings(false)}>
        <div className="modal-box sci">
          <div className="modal-title">⚙️ Pengaturan Level</div>

          {/* Tier reference */}
          <div style={{background:"var(--off)",border:"1px solid var(--bdr)",borderRadius:"var(--r)",padding:"12px 14px",marginBottom:18}}>
            <div style={{fontSize:11,fontWeight:800,color:"var(--tx3)",textTransform:"uppercase",letterSpacing:.6,marginBottom:10}}>Referensi Tier</div>
            {TIERS.map(t=>(
              <div key={t.name} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:"1px solid var(--bdr)"}}>
                <span style={{fontSize:13,fontWeight:700,color:t.col}}>{t.icon} {t.name}</span>
                <span style={{fontSize:12,color:"var(--tx3)"}}>Level {t.range[0]}{t.range[0]===31?"":("–"+t.range[1])} · {t.desc}</span>
              </div>
            ))}
          </div>

          <div className="field">
            <label>Poin yang Dibutuhkan per Level (10–1000)</label>
            <input type="number" min={10} max={1000} value={settingsForm.poinPerLevel} onChange={e=>setSettingsForm(x=>({...x,poinPerLevel:e.target.value}))}/>
            <div style={{fontSize:11,color:"var(--tx3)",marginTop:4}}>
              Contoh: dengan {settingsForm.poinPerLevel} poin/level → Level 6 (Elite) butuh {5*settingsForm.poinPerLevel} poin · Level 11 (Master) butuh {10*settingsForm.poinPerLevel} poin
            </div>
          </div>

          <div className="field">
            <label>Level Awal Default Siswa Baru (1–31)</label>
            <input type="number" min={1} max={31} value={settingsForm.startLevel} onChange={e=>setSettingsForm(x=>({...x,startLevel:e.target.value}))}/>
            <div style={{marginTop:6,fontSize:12,fontWeight:700,color:getTier(Math.max(1,Math.min(31,Number(settingsForm.startLevel)||1))).col}}>
              {(() => {const t=getTier(Math.max(1,Math.min(31,Number(settingsForm.startLevel)||1)));return `${t.icon} ${t.name} — ${t.desc}`;})()}
            </div>
          </div>

          <div className="modal-acts">
            <button className="m-cancel" onClick={()=>setShowSettings(false)}>Batal</button>
            <button className="m-ok" onClick={saveSettings}>Simpan Pengaturan</button>
          </div>
        </div>
      </div>}
    </div>
  );
}

// LOGIN
// ═══════════════════════════════════════════════════════════════
function Login({onLogin}){
  const [tab,setTab]=useState("siswa");const [u,setU]=useState("");const [p,setP]=useState("");const [err,setErr]=useState("");
  const go=()=>{setErr("");if(tab==="tutor"){if(u===TUTOR.username&&p===TUTOR.password)onLogin({role:"tutor"});else setErr("Username atau password salah");}else{const s=DEFAULT_STUDENTS.find(x=>x.username===u&&x.password===p);if(s)onLogin({role:"siswa",...s});else setErr("Username atau password salah");}};
  return(
    <div className="lw">
      <div className="ll">
        <div className="ll-circle" style={{width:300,height:300,top:-80,right:-80}}/><div className="ll-circle" style={{width:180,height:180,bottom:-50,left:-50}}/><div className="ll-circle" style={{width:90,height:90,top:"42%",left:"8%"}}/>
        <div className="ll-content fu">
          <div className="neo-big">NEO</div>
          <div className="neo-sub-txt">Learning Platform</div>
          <div className="lf-list">
            {[{e:"🗂️",t:"Pilih materi bebas — 4 jenjang, 15 topik"},{e:"⚡",t:"Soal tak terbatas dengan generator otomatis"},{e:"🧠",t:"Pembahasan langkah-demi-langkah otomatis"},{e:"📋",t:"Tutor lihat riwayat topik per siswa"}].map((f,i)=>(
              <div key={i} className="lf-item"><div className="lf-dot">{f.e}</div><span>{f.t}</span></div>
            ))}
          </div>
        </div>
      </div>
      <div className="lr">
        <div className="lform fu">
          <div className="logo-row"><div className="logo-ico"><span style={{fontFamily:"'Syne',sans-serif",fontSize:15,fontWeight:800,color:"white",letterSpacing:-1}}>N</span></div><span className="logo-txt">NEO</span></div>
          <div className="lhd">Selamat Datang</div>
          <div className="lsub">Masuk ke platform pembelajaran NEO</div>
          <div className="tab-row">
            <button className={`tab-btn ${tab==="siswa"?"on":""}`} onClick={()=>{setTab("siswa");setErr("")}}>👦 Siswa</button>
            <button className={`tab-btn ${tab==="tutor"?"on":""}`} onClick={()=>{setTab("tutor");setErr("")}}>👩‍🏫 Tutor</button>
          </div>
          {err&&<div className="login-err">⚠ {err}</div>}
          <div className="field"><label>Username</label><input value={u} onChange={e=>setU(e.target.value)} placeholder={tab==="tutor"?"tutor":"username siswa"}/></div>
          <div className="field"><label>Password</label><input type="password" value={p} onChange={e=>setP(e.target.value)} placeholder="••••••" onKeyDown={e=>e.key==="Enter"&&go()}/></div>
          <button className="login-cta" onClick={go}>Masuk ke NEO →</button>
          {tab==="siswa"&&<div className="login-note">Akun dibuat dan diatur oleh tutor kamu</div>}
        </div>
      </div>
    </div>
  );
}

function App(){
  const [user,setUser]=useState(null);
  return(<><style>{G}</style>{!user&&<Login onLogin={setUser}/>}{user?.role==="siswa"&&<StudentApp user={user} onLogout={()=>setUser(null)}/>}{user?.role==="tutor"&&<TutorApp onLogout={()=>setUser(null)}/>}</>);
}

    // Render the app
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);

    // Hide loading screen after render
    setTimeout(() => {
      const loading = document.getElementById('loading');
      if (loading) {
        loading.style.opacity = '0';
        setTimeout(() => loading.remove(), 500);
      }
    }, 800);
  </script>
</body>
</html>
